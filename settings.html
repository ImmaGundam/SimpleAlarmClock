<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — Alarm Clock</title>
<link rel="icon" href="icon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="settings-body">

<div class="pywebview-drag-region" style="position:fixed; top:0; left:0; right:0; height:32px; z-index:999; cursor:move;"></div>
<div class="settings-page-card" style="margin-top:20px; position:relative;">
  <button class="close-btn" onclick="if(window.pywebview) window.pywebview.api.close_settings(); else window.close();" style="position:absolute; top:20px; right:20px; z-index:1000;" title="Close">✕</button>
  <h3>⚙️ Settings</h3>

  <!-- Display -->
  <span class="setting-label">Display</span>
  <div class="toggle-row">
    <span>Military Time (24h)</span>
    <label class="toggle">
      <input type="checkbox" id="military">
      <span class="slider-track"></span>
    </label>
  </div>
  <div class="toggle-row">
    <span>Show Date</span>
    <label class="toggle">
      <input type="checkbox" id="showDate" checked>
      <span class="slider-track"></span>
    </label>
  </div>

  <!-- Display -->

  <!-- Theme -->
  <span class="setting-label">Theme</span>
  <div class="theme-grid" id="themeGrid"></div>

  <!-- Font -->
  <span class="setting-label">Font</span>
  <select id="font">
    <option value="'DM Sans', sans-serif">DM Sans</option>
    <option value="'Segoe UI', sans-serif">Segoe UI</option>
    <option value="Arial, sans-serif">Arial</option>
    <option value="Verdana, sans-serif">Verdana</option>
    <option value="Tahoma, sans-serif">Tahoma</option>
    <option value="Georgia, serif">Georgia</option>
    <option value="'Times New Roman', serif">Times New Roman</option>
    <option value="'Courier New', monospace">Courier New</option>
  </select>

  <!-- Sound -->
  <span class="setting-label">Alarm Sound</span>
  <select id="sound" onchange="toggleCustomBtn()">
    <option value="alarm1">Standard Alarm</option>
    <option value="alarm2">Digital Alarm</option>
    <option value="alarm3">Classic Alarm</option>
    <option value="gentle">Gentle Chime</option>
    <option value="beep">Simple Beep</option>
    <option value="buzzer">Buzzer</option>
    <option value="custom">📁 Custom File…</option>
  </select>
  <button class="file-btn" id="customFileBtn" onclick="browseSound()" style="display:none;">
    📂 Browse for sound file
  </button>
  <div id="custom-name"></div>
  <div class="btn-preview-row">
    <button class="btn-preview" onclick="previewSound()">▶ Preview</button>
    <button class="btn-preview" onclick="stopPreview()">■ Stop</button>
  </div>

  <!-- Advanced -->
  <span class="setting-label">Advanced</span>
  <div class="toggle-row">
    <span>Disable Animations</span>
    <label class="toggle">
      <input type="checkbox" id="disableJS" onchange="toggleAnimations()">
      <span class="slider-track"></span>
    </label>
  </div>

  <button class="save-btn" id="saveBtn" onclick="save()">
    Save Settings
  </button>

  <div class="settings-page-footer">
    Developed by James D.<br>
    <a href="https://github.com/ImmaGundam">github.com/ImmaGundam</a>
    &nbsp;·&nbsp;
    <a href="https://webgeeks.org">webgeeks.org</a>
  </div>
</div>

<input type="file" id="fileInput" accept="audio/*" style="display:none" onchange="handleFile(this)">

<script>
// ─── DRAG + RESIZE SYSTEM (pywebview frameless, easy_drag=False) ─────────
// Reads true window rect from Python on mousedown (JS window.outerWidth etc.
// are wrong inside pywebview). RAF-throttles mousemove so Python call queue
// never backs up. Also handles titlebar drag-to-move.
(function installWindowControls() {
  const EDGE  = 7;
  const MIN_W = 320, MIN_H = 400;
  const MAX_W = 900, MAX_H = 1000;

  const style = document.createElement('style');
  style.textContent = `.rh { position:fixed; z-index:9999; }`;
  document.head.appendChild(style);

  const defs = [
    { id:'rh-n',  cur:'n-resize',  t:0,    l:EDGE, r:EDGE, b:null, H:EDGE, W:null, dir:'n'  },
    { id:'rh-s',  cur:'s-resize',  t:null, l:EDGE, r:EDGE, b:0,    H:EDGE, W:null, dir:'s'  },
    { id:'rh-e',  cur:'e-resize',  t:EDGE, l:null, r:0,    b:EDGE, H:null, W:EDGE, dir:'e'  },
    { id:'rh-w',  cur:'w-resize',  t:EDGE, l:0,    r:null, b:EDGE, H:null, W:EDGE, dir:'w'  },
    { id:'rh-nw', cur:'nw-resize', t:0,    l:0,    r:null, b:null, H:EDGE, W:EDGE, dir:'nw' },
    { id:'rh-ne', cur:'ne-resize', t:0,    l:null, r:0,    b:null, H:EDGE, W:EDGE, dir:'ne' },
    { id:'rh-sw', cur:'sw-resize', t:null, l:0,    r:null, b:0,    H:EDGE, W:EDGE, dir:'sw' },
    { id:'rh-se', cur:'se-resize', t:null, l:null, r:0,    b:0,    H:EDGE, W:EDGE, dir:'se' },
  ];

  defs.forEach(cfg => {
    const el = document.createElement('div');
    el.className = 'rh'; el.id = cfg.id; el.style.cursor = cfg.cur;
    if (cfg.t !== null) el.style.top    = cfg.t + 'px';
    if (cfg.b !== null) el.style.bottom = cfg.b + 'px';
    if (cfg.l !== null) el.style.left   = cfg.l + 'px';
    if (cfg.r !== null) el.style.right  = cfg.r + 'px';
    el.style.height = cfg.H !== null ? cfg.H + 'px' : '100%';
    el.style.width  = cfg.W !== null ? cfg.W + 'px' : '100%';
    document.body.appendChild(el);

    el.addEventListener('mousedown', async e => {
      if (!window.pywebview) return;
      e.preventDefault(); e.stopPropagation();

      // Read true OS window rect from Python — JS values are wrong in pywebview
      const rect = await window.pywebview.api.get_settings_window_state();
      if (!rect) return;

      const startMX = e.screenX, startMY = e.screenY;
      const startW  = rect.w,    startH  = rect.h;
      const startWX = rect.x,    startWY = rect.y;
      const dir = cfg.dir;
      let rafPending = false;

      const onMove = mv => {
        if (rafPending) return;   // RAF throttle — one Python call per frame
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          const dx = mv.screenX - startMX, dy = mv.screenY - startMY;
          let nW = startW, nH = startH, nX = startWX, nY = startWY;

          if (dir.includes('e')) nW = Math.min(MAX_W, Math.max(MIN_W, startW + dx));
          if (dir.includes('s')) nH = Math.min(MAX_H, Math.max(MIN_H, startH + dy));
          if (dir.includes('w')) { nW = Math.min(MAX_W, Math.max(MIN_W, startW - dx)); nX = startWX + (startW - nW); }
          if (dir.includes('n')) { nH = Math.min(MAX_H, Math.max(MIN_H, startH - dy)); nY = startWY + (startH - nH); }

          if (dir.includes('n') || dir.includes('w')) {
            window.pywebview.api.move_and_resize_settings_window(Math.round(nX), Math.round(nY), Math.round(nW), Math.round(nH));
          } else {
            window.pywebview.api.resize_settings_window(Math.round(nW), Math.round(nH));
          }
        });
      };

      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });

  // ── Titlebar drag-to-move (replaces easy_drag) ────────────────────────
  const dragRegion = document.querySelector('.pywebview-drag-region');
  if (dragRegion) {
    dragRegion.addEventListener('mousedown', async e => {
      if (!window.pywebview) return;
      e.preventDefault();
      const rect = await window.pywebview.api.get_settings_window_state();
      if (!rect) return;

      const startMX = e.screenX, startMY = e.screenY;
      const startWX = rect.x,    startWY = rect.y;
      let rafPending = false;

      const onMove = mv => {
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(() => {
          rafPending = false;
          window.pywebview.api.move_settings_window(
            Math.round(startWX + (mv.screenX - startMX)),
            Math.round(startWY + (mv.screenY - startMY))
          );
        });
      };

      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
})();
</script>

<script>
const THEMES = {
  mac:          { bg1:'#e9eef5', bg2:'#cfd9e6', label:'Light' },
  macdark:      { bg1:'#2c2c2e', bg2:'#1c1c1e', label:'Dark' },
  dark:         { bg1:'#0f2027', bg2:'#2c5364', label:'Blue Glass' },
  red:          { bg1:'#2b0000', bg2:'#220022', label:'Crimson' },
  pinklight:    { bg1:'#ffd6ec', bg2:'#ffeaf6', label:'Pink' },
  pinkdark:     { bg1:'#5c0030', bg2:'#1f0010', label:'Rose Dark' },
  rainbowlight: { bg1:'#ffadad', bg2:'#9bf6ff', label:'Rainbow' },
  rainbowdark:  { bg1:'#2a0050', bg2:'#003d4a', label:'Neon Dark' },
  forest:       { bg1:'#1a3a1a', bg2:'#2d5a2d', label:'Forest' },
  ocean:        { bg1:'#003366', bg2:'#006699', label:'Ocean' },
  sand:         { bg1:'#f5e6c8', bg2:'#e8d5a0', label:'Sand' },
  midnight:     { bg1:'#080820', bg2:'#0d0d2e', label:'Midnight' }
};

let selectedTheme = 'mac';
let customURL = null;
let customName = null;
let previewAudio = new Audio();
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let synthInterval = null;

function getCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function beepPattern(freqs, dur, gap) {
  stopSynth();
  let ctx = getCtx();
  let t = ctx.currentTime;
  let i = 0;
  function b() {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = freqs[i % freqs.length];
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t); osc.stop(t + dur);
    t += dur + gap; i++;
  }
  b();
  synthInterval = setInterval(b, (dur + gap) * 1000);
  setTimeout(stopSynth, 3000);
}

function stopSynth() {
  if (synthInterval) { clearInterval(synthInterval); synthInterval = null; }
}

function previewSound() {
  stopPreview();
  const s = document.getElementById('sound').value;
  if (s === 'custom' && customURL) {
    previewAudio.src = customURL;
    previewAudio.play().catch(()=>{});
    setTimeout(() => { previewAudio.pause(); previewAudio.currentTime = 0; }, 3000);
    return;
  }
  if      (s === 'alarm1') beepPattern([880, 660],          0.15, 0.05);
  else if (s === 'alarm2') beepPattern([1200],              0.08, 0.08);
  else if (s === 'alarm3') beepPattern([440, 550, 660, 550],0.2,  0.05);
  else if (s === 'gentle') beepPattern([523, 659, 784],     0.4,  0.2);
  else if (s === 'beep')   beepPattern([1000],              0.1,  0.4);
  else if (s === 'buzzer') beepPattern([120, 100],          0.3,  0.05);
}

function stopPreview() {
  previewAudio.pause(); previewAudio.currentTime = 0;
  stopSynth();
}

function browseSound() { document.getElementById('fileInput').click(); }

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  customURL = URL.createObjectURL(file);
  customName = file.name;
  document.getElementById('custom-name').textContent = '📄 ' + file.name;
}

function toggleCustomBtn() {
  const v = document.getElementById('sound').value;
  document.getElementById('customFileBtn').style.display = v === 'custom' ? 'flex' : 'none';
  fitToContent();
}

function buildThemeGrid(current) {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = '';
  for (const [key, t] of Object.entries(THEMES)) {
    const el = document.createElement('div');
    el.className = 'theme-swatch' + (key === current ? ' active' : '');
    el.setAttribute('data-label', t.label);
    el.style.background = `linear-gradient(135deg, ${t.bg1}, ${t.bg2})`;
    el.onclick = () => {
      selectedTheme = key;
      document.querySelectorAll('.theme-swatch').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
    };
    grid.appendChild(el);
  }
}

function toggleAnimations() {
  const off = document.getElementById('disableJS').checked;
  let existing = document.getElementById('no-anim');
  if (off && !existing) {
    const s = document.createElement('style');
    s.id = 'no-anim';
    s.textContent = '*, *::before, *::after { animation: none !important; transition: none !important; }';
    document.head.appendChild(s);
  } else if (!off && existing) {
    existing.remove();
  }
}

let _fitTimer = null;
function fitToContent() {
  if (!window.pywebview || !window.pywebview.api) return;
  if (_fitTimer) clearTimeout(_fitTimer);
  _fitTimer = setTimeout(() => {
    const card = document.querySelector('.settings-page-card');
    if (!card) return;
    const bodyStyle = getComputedStyle(document.body);
    const vPad = parseFloat(bodyStyle.paddingTop) + parseFloat(bodyStyle.paddingBottom);
    const hPad = parseFloat(bodyStyle.paddingLeft) + parseFloat(bodyStyle.paddingRight);
    // scrollHeight: true content height, unaffected by CSS overflow clipping
    const h = card.scrollHeight + vPad + 46;   // +46 = drag region height
    const w = card.scrollWidth  + hPad + 18;
    if (window.pywebview.api.resize_settings_window) {
      window.pywebview.api.resize_settings_window(Math.round(w), Math.round(h));
    }
    _fitTimer = null;
  }, 80);
}

async function load() {
  let s = {};
  try { s = await window.pywebview.api.get_settings(); } catch(e) {}

  document.getElementById('military').checked   = s.military || false;
  document.getElementById('showDate').checked   = s.showDate !== false;
  document.getElementById('disableJS').checked  = s.disableJS || false;
  document.getElementById('sound').value        = s.sound || 'alarm1';
  toggleCustomBtn();
  selectedTheme = s.theme || 'mac';
  buildThemeGrid(selectedTheme);

  const fontSel = document.getElementById('font');
  if (s.font) {
    for (let opt of fontSel.options) {
      if (opt.value === s.font) { fontSel.value = opt.value; break; }
    }
  }
  if (s.customSoundName) {
    customName = s.customSoundName;
    document.getElementById('custom-name').textContent = '📄 ' + s.customSoundName;
  }
  if (s.disableJS) toggleAnimations();
  fitToContent();
}

async function save() {
  const btn = document.getElementById('saveBtn');
  const s = {
    military:        document.getElementById('military').checked,
    showDate:        document.getElementById('showDate').checked,
    theme:           selectedTheme,
    font:            document.getElementById('font').value,
    sound:           document.getElementById('sound').value,
    disableJS:       document.getElementById('disableJS').checked,
    customSoundName: customName || null
  };
  try { await window.pywebview.api.save_settings(s); } catch(e) {}
  btn.textContent = '✓ Saved';
  btn.classList.add('save-flash');
  setTimeout(() => {
    btn.textContent = 'Save Settings';
    btn.classList.remove('save-flash');
  }, 1800);
}

document.fonts.ready.then(fitToContent);
window.addEventListener('pywebviewready', fitToContent);
load();
</script>

<!-- ── MANUAL RESIZE HANDLES (frameless workaround) ── -->
<style>
.rs { position: fixed; z-index: 9999; }
.rs-n  { top:0;    left:8px;   right:8px;  height:5px; cursor:n-resize;  }
.rs-s  { bottom:0; left:8px;   right:8px;  height:5px; cursor:s-resize;  }
.rs-w  { left:0;   top:8px;    bottom:8px; width:5px;  cursor:w-resize;  }
.rs-e  { right:0;  top:8px;    bottom:8px; width:5px;  cursor:e-resize;  }
.rs-nw { top:0;    left:0;     width:12px; height:12px; cursor:nw-resize; }
.rs-ne { top:0;    right:0;    width:12px; height:12px; cursor:ne-resize; }
.rs-sw { bottom:0; left:0;     width:12px; height:12px; cursor:sw-resize; }
.rs-se { bottom:0; right:0;    width:12px; height:12px; cursor:se-resize; }
</style>
<div class="rs rs-n"  data-dir="n"></div>
<div class="rs rs-s"  data-dir="s"></div>
<div class="rs rs-w"  data-dir="w"></div>
<div class="rs rs-e"  data-dir="e"></div>
<div class="rs rs-nw" data-dir="nw"></div>
<div class="rs rs-ne" data-dir="ne"></div>
<div class="rs rs-sw" data-dir="sw"></div>
<div class="rs rs-se" data-dir="se"></div>
<script>
(function() {
  if (!window.pywebview) return;
  let drag = null;

  document.querySelectorAll('.rs').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      drag = {
        dir:      el.dataset.dir,
        startX:   e.screenX,
        startY:   e.screenY,
        startW:   window.outerWidth,
        startH:   window.outerHeight,
        startWinX: window.screenX,
        startWinY: window.screenY
      };
    });
  });

  let pending = false;
  function doResize(dx, dy) {
    if (pending) return;
    pending = true;
    requestAnimationFrame(() => {
      const d = drag.dir;
      let w = drag.startW, h = drag.startH;
      let x = drag.startWinX, y = drag.startWinY;
      if (d.includes('e'))  w += dx;
      if (d.includes('s'))  h += dy;
      if (d.includes('w')) { w -= dx; x += dx; }
      if (d.includes('n')) { h -= dy; y += dy; }
      const needsMove = d.includes('n') || d.includes('w');
      const api = window.pywebview.api;
      if (needsMove) {
        api.move_and_resize_settings_window(Math.round(x), Math.round(y),
                                            Math.round(w), Math.round(h));
      } else {
        api.resize_settings_window(Math.round(w), Math.round(h));
      }
      pending = false;
    });
  }

  window.addEventListener('mousemove', e => {
    if (!drag) return;
    doResize(e.screenX - drag.startX, e.screenY - drag.startY);
  });
  window.addEventListener('mouseup', () => { drag = null; });
})();
</script>
</body>
</html>
