<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

/* BACKGROUND */

body{

font-family:"Segoe UI","Helvetica Neue",Arial;

background:linear-gradient(180deg,#e9eef5,#cfd9e6);

margin:0;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

transition:0.3s;

}


/* TRANSLUCENT CARD */

.card{

background:rgba(255,255,255,0.35);

backdrop-filter:blur(25px);

border-radius:28px;

padding:25px;

width:260px;

text-align:center;

box-shadow:

0 15px 35px rgba(0,0,0,0.25);

transition:0.3s;

}


/* HEADER */

.header{

display:flex;
justify-content:center;
gap:8px;

margin-bottom:5px;

}

.header img{
width:28px;
}


/* CLOCK */

.clock{

font-size:38px;

font-weight:300;

margin-bottom:10px;

}


/* INPUT */

input{

background:#d9ecff;

border:none;

padding:8px;

border-radius:10px;

width:180px;

margin-top:8px;

font-size:14px;

}


/* BUTTONS */

button{

margin-top:10px;

padding:10px;

border:none;

border-radius:12px;

background:#007aff;

color:white;

width:120px;

cursor:pointer;

}


/* SETTINGS BUTTON */

.settings{

width:90px;

font-size:12px;

background:#e0e0e0;

color:black;

}


</style>

</head>

<body>

<div class="card">

<div class="header">

<img src="clock.png">


<b>Alarm Clock</b>

</div>


<div id="clock" class="clock"></div>


<input type="time" step="1" id="alarmTime">


<br>

<button id="alarmButton"
onclick="alarmAction()">

Set Alarm

</button>


<br>

<button class="settings"
onclick="window.pywebview.api.open_settings()">

Settings

</button>


</div>


<script>

function setMilitary(val){

military=val

}

let alarmSet=false
let military=false
let selectedSound="alarm1"

let audio=new Audio()



async function loadSettings(){

let s=
await window.pywebview.api.get_settings()

military=s.military

selectedSound=s.sound

applyTheme(s.theme)

applyFont(s.font)

}



function applyFont(font){

document.body.style.fontFamily=font

}



/* THEMES */

function applyTheme(theme){

/* macOS light */

if(theme=="mac")

document.body.style.background=
"linear-gradient(180deg,#e9eef5,#cfd9e6)"

/* dark glass */

else if(theme=="dark")

document.body.style.background=
"linear-gradient(135deg,#0f2027,#203a43,#2c5364)"

/* red purple */

else if(theme=="red")

document.body.style.background=
"linear-gradient(135deg,#2b0000,#4a0033,#220022)"

/* macOS dark */

else if(theme=="macdark")

document.body.style.background=
"linear-gradient(180deg,#2c2c2e,#1c1c1e)"

/* pink light */

else if(theme=="pinklight")

document.body.style.background=
"linear-gradient(180deg,#ffd6ec,#ffeaf6)"

/* pink dark */

else if(theme=="pinkdark")

document.body.style.background=
"linear-gradient(180deg,#5c0030,#1f0010)"

/* rainbow light */

else if(theme=="rainbowlight")

document.body.style.background=
"linear-gradient(180deg,#ffadad,#ffd6a5,#fdffb6,#caffbf,#9bf6ff,#a0c4ff,#bdb2ff,#ffc6ff)"

/* rainbow dark */

else if(theme=="rainbowdark")

document.body.style.background=
"linear-gradient(180deg,#4a0000,#4a2c00,#4a4a00,#004a00,#003d4a,#001f4a,#2c004a,#4a0033)"

}


/* CLOCK */

function updateClock(){

let now=new Date()

let h=now.getHours()

let m=String(now.getMinutes()).padStart(2,'0')

let s=String(now.getSeconds()).padStart(2,'0')


if(military)

clock.innerText=
String(h).padStart(2,'0')+":"+m+":"+s

else{

let suffix=h>=12?"PM":"AM"

h=h%12
if(h==0)h=12

clock.innerText=
h+":"+m+":"+s+" "+suffix

}

}

setInterval(updateClock,1000)



/* ALARM */

function alarmAction(){

let button=document.getElementById("alarmButton")

if(!alarmSet){

let time=document.getElementById("alarmTime").value

window.pywebview.api.set_alarm(time)

button.innerText="Alarm is Set"

alarmSet=true

}

else{

window.pywebview.api.stop_alarm()

button.innerText="Set Alarm"

alarmSet=false

}

}



function playSound(){

audio.src="sounds/"+selectedSound+".mp3"

audio.loop=true

audio.play()

}


function stopSound(){

audio.pause()

audio.currentTime=0

}


function setSound(s){

selectedSound=s

}



loadSettings()

updateClock()

</script>

</body>

</html>
