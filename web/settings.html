<!DOCTYPE html>
<html>

<head>

<style>

body{

font-family:Segoe UI;
background:#f2f2f2;
padding:20px;

}

.card{

background:white;
padding:15px;
border-radius:12px;

}

select{

margin-top:5px;
padding:6px;
border-radius:6px;
width:200px;

}

button{

margin-top:15px;
padding:8px;
border:none;
border-radius:8px;
background:#007aff;
color:white;

}

</style>

</head>

<body>

<div class="card">

<h3>Settings</h3>


<label>

<input type="checkbox" id="military">

Military Time

</label>


<br><br>

Theme:

<br>

<select id="theme">

<option value="mac">macOS Light</option>

<option value="macdark">macOS Dark</option>

<option value="dark">Dark Glass</option>

<option value="red">Red Purple Glass</option>

<option value="pinklight">Pink Gradient Light</option>

<option value="pinkdark">Pink Gradient Dark</option>

<option value="rainbowlight">Rainbow Light</option>

<option value="rainbowdark">Rainbow Dark</option>

</select>


<br><br>

Font:

<br>

<select id="font">

<option>Segoe UI</option>
<option>Arial</option>
<option>Verdana</option>
<option>Tahoma</option>
<option>Helvetica</option>
<option>Calibri</option>
<option>Trebuchet MS</option>
<option>Georgia</option>
<option>Times New Roman</option>
<option>Courier New</option>

</select>


<br><br>

Alarm Sound:

<br>

<select id="sound">

<option value="alarm1">Standard Alarm</option>
<option value="alarm2">Digital Alarm</option>
<option value="alarm3">Classic Alarm</option>

</select>


<br>

<button onclick="save()">

Save Settings

</button>


<br><br>

<p style="font-size:10px; ">
Developed by James D.

<br>

https://github.com/ImmaGundam

</p>
</div>


<script>

async function load(){

let s =
await window.pywebview.api.get_settings()

document.getElementById("military").checked=s.military
document.getElementById("theme").value=s.theme
document.getElementById("font").value=s.font
document.getElementById("sound").value=s.sound

}



async function save(){

let s={

military:
document.getElementById("military").checked,

theme:
document.getElementById("theme").value,

font:
document.getElementById("font").value,

sound:
document.getElementById("sound").value

}


await window.pywebview.api.save_settings(s)

alert("Settings Saved ✓")

}


load()

</script>

</body>

</html>
